<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Novruz Təbriki</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin: 0;
        }

        /* 1-ci səhifə */
        #page1 {
            background-color: #f2f2f2;
            height: 100vh;
            padding-top: 100px;
        }

        /* 2-ci səhifə */
        #page2 {
            display: none;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            height: 100vh;
            padding-top: 100px;
        }

        h1 {
            color: green;
        }

        #page2 h1 {
            color: red;
        }

        p {
            font-size: 22px;
            color: #333;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: orange;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkorange;
        }
    </style>
</head>
<body>

    <!-- 1-ci səhifə -->
    <div id="page1">
        <h1>🌸 Novruz Bayramın Mübarək! 🌸</h1>
        <p>Təbriki görmək üçün düyməyə bas 👇</p>
        <button onclick="showPage2()">Təbriki Aç</button>
    </div>

    <!-- 2-ci səhifə -->
    <div id="page2">
        <h1>🌷 Novruz Bayramın Mübarək 🌷</h1>
        <p>
            Mənim ən sevimli dayım qızı Gilane ❤️<br><br>
            Səni Novruz bayramı münasibətilə təbrik edirəm!<br><br>
            Sən mənim ürəyimsən 💖
        </p>
    </div>

    <script>
        function showPage2() {
            document.getElementById("page1").style.display = "none";
            document.getElementById("page2").style.display = "block";
        }
    </script>

</body>
</html>
