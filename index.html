<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Novruz Təbriki</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: url("https://images.unsplash.com/photo-1608889175766-5c9d6eebf6b0") no-repeat center/cover;
}

/* blur */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(6px);
}

/* page */
.page {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* kart */
.card {
    backdrop-filter: blur(15px);
    background: rgba(0,0,0,0.45);
    border-radius: 25px;
    padding: 50px;
    text-align: center;
    color: white;
    box-shadow: 0 0 40px rgba(0,0,0,0.7);
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: scale(0.8);}
    to {opacity:1; transform: scale(1);}
}

.hidden {
    display: none;
}

/* title */
h1 {
    font-size: 45px;
    margin-bottom: 20px;
    text-shadow: 0 0 10px black;
}

/* button */
button {
    padding: 15px 35px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #ff512f, #dd2476);
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Gilane */
.name {
    font-size: 65px;
    font-weight: bold;
    background: linear-gradient(45deg, gold, pink, red);
    -webkit-background-clip: text;
    color: transparent;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px pink; }
    to { text-shadow: 0 0 30px red; }
}

/* mesaj */
.message {
    font-size: 24px;
    margin-top: 20px;
    color: #ffffff;
    text-shadow: 0 0 10px black;
}

/* ürəklər */
.heart {
    position: absolute;
    color: red;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity:1; }
    to { transform: translateY(-10vh); opacity:0; }
}

/* fireworks */
.firework {
    position: absolute;
    width: 6px;
    height: 6px;
    background: yellow;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    to {
        transform: scale(25);
        opacity: 0;
    }
}

/* music button */
.music-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 20px;
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3a7b5c5c0b.mp3?filename=romantic-background-112191.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="playMusic()">🎵 Play</button>

<!-- 1-ci səhifə -->
<div id="page1" class="page">
    <div class="card">
        <h1>🌸 Novruz Bayramın Mübarək 🌸</h1>
        <button onclick="nextPage()">Təbriki Aç</button>
    </div>
</div>

<!-- 2-ci səhifə -->
<div id="page2" class="page hidden">
    <div class="card">
        <div class="name">Gilane ❤️</div>

        <div class="message">
            Mənim ən sevimli dayım qızı 💖<br><br>
            Səni Novruz bayramı münasibətilə təbrik edirəm!<br><br>
            Sən mənim ürəyimsən ❤️
        </div>
    </div>
</div>

<script>
function nextPage() {
    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");
}

/* musiqi */
function playMusic(){
    let music = document.getElementById("music");
    music.play();
}

/* ürəklər */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (15 + Math.random()*25)+"px";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),6000);
},300);

/* fireworks */
setInterval(() => {
    let f = document.createElement("div");
    f.className = "firework";
    f.style.left = Math.random()*100 + "vw";
    f.style.top = Math.random()*100 + "vh";
    document.body.appendChild(f);

    setTimeout(()=>f.remove(),1000);
},500);
</script>

</body>
</html>
