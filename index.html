<!DOCTYPE html>

<style>
body {

}

/* Arxa fon animasiya */
body {
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
}

@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* s…ôhif…ôl…ôr */
.page {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* gizl…ôt */
.hidden {

}

/* baŇülńĪq */
h1 {

}

/* button */
button {
    padding: 15px 35px;
    font-size: 20px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, orange, red);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Gilane */
.name {
    font-size: 60px;
    font-weight: bold;
    background: linear-gradient(45deg, purple, red);
    -webkit-background-clip: text;
    color: transparent;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px pink; }
    to { text-shadow: 0 0 25px red; }
}

/* mesaj */
.message {
    font-size: 25px;
    color: white;
    text-align: center;
    max-width: 600px;
}

/* √ľr…ôkl…ôr */
.heart {

    color: red;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity:1; }
    100% { transform: translateY(-10vh); opacity:0; }
}
</style>
</head>

<body>
